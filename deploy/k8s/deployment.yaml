apiVersion: apps/v1
kind: Deployment
metadata:
  name: contract-service
  namespace: production
  labels:
    app: contract-service
    component: backend
    part-of: instituto-itinerante
    environment: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contract-service
      environment: production
  template:
    metadata:
      labels:
        app: contract-service
        component: backend
        part-of: instituto-itinerante
        environment: production
    spec:
      containers:
      - name: contract-service
        image: ghcr.io/apsferreira/contract-service:main-64bbb65
        ports:
        - containerPort: 3014
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "3014"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: contract-service-secrets
              key: database-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: contract-service-secrets
              key: jwt-secret
        - name: OTEL_SERVICE_NAME
          value: "contract-service"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: contract-service-config
              key: otel-endpoint
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 65534
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
      restartPolicy: Always
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
