name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test
    runs-on: iit-openclaw
    continue-on-error: true
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Start Postgres via Docker
        run: |
          docker run -d --name pg_test \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=contract_test \
            -p 5432:5432 \
            postgres:15
          for i in $(seq 1 30); do
            docker exec pg_test pg_isready -U postgres 2>/dev/null && echo "postgres pronto" && break
            sleep 2
          done

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false

      - name: Download dependencies
        env:
          GOTOOLCHAIN: auto
        run: go mod download

      - name: Run tests
        env:
          GOTOOLCHAIN: auto
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/contract_test?sslmode=disable
        run: go test ./... -timeout 60s

      - name: Cleanup containers
        if: always()
        run: docker rm -f pg_test 2>/dev/null || true

  build-and-push:
    name: Build & Push Backend
    runs-on: iit-openclaw
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/apsferreira/contract-service
          tags: |
            type=raw,value=main-latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/home/runner/buildcache-contract-backend
          cache-to: type=local,dest=/home/runner/buildcache-contract-backend,mode=max

  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: iit-openclaw
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/apsferreira/contract-service-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=local,src=/home/runner/buildcache-contract-frontend
          cache-to: type=local,dest=/home/runner/buildcache-contract-frontend,mode=max

  update-manifest:
    name: Update K8s Manifest
    runs-on: iit-openclaw
    needs: [build-and-push, build-and-push-frontend]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Update image tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          sed -i "s|image: ghcr.io/apsferreira/contract-service:.*|image: ghcr.io/apsferreira/contract-service:sha-${SHORT_SHA}|" deploy/k8s/deployment.yaml
          sed -i "s|image: ghcr.io/apsferreira/contract-service-frontend:.*|image: ghcr.io/apsferreira/contract-service-frontend:sha-${SHORT_SHA}|" deploy/k8s/frontend-deployment.yaml

      - name: Commit updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/deployment.yaml deploy/k8s/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update images to sha-$(echo '${{ github.sha }}' | cut -c1-7)"
          git push
