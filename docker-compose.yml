version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: contracts_user
      POSTGRES_PASSWORD: contracts_pass
      POSTGRES_DB: contracts_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contracts_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  contract-service:
    build: .
    ports:
      - "3014:3014"
    environment:
      PORT: 3014
      DATABASE_URL: postgres://contracts_user:contracts_pass@postgres:5432/contracts_db?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
